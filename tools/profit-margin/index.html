<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profit Margin Calculator</title>

<meta name="description"
content="Calculate your profit margin percentage.">

<meta name="keywords"
content="profit margin calculator, margin calculator, business calculator">

<header>

<h1>Profit Margin Calculator</h1>

<p>Finance</p>

</header>

<main>

<p>The Profit Margin Calculator helps you quickly calculate calculate your profit margin percentage. using simple inputs and instant results.</p>

<br>



<div class="form-group">

<label>Revenue</label>

<input
type="number"
id="revenue"
inputmode="decimal"
step="0.01"
min="0"
placeholder="0.00">

<div class="form-group">

<label>Cost</label>

<input
type="number"
id="cost"
inputmode="decimal"
step="0.01"
min="0"
placeholder="0.00">

</div>

<section class="card">

<h2>Related Tools</h2>

<div class="related-tools">
